<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stash</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --surface2: #1a1a1a;
      --border: #222;
      --border2: #2f2f2f;
      --text: #e8e8e8;
      --muted: #666;
      --muted2: #444;
      --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 13px;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* drag region lets the user move the window by the title bar */
    .titlebar {
      -webkit-app-region: drag;
      height: 38px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .close-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 14px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
    }
    .close-btn:hover { color: var(--text); background: var(--surface2); }

    .controls {
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--muted2); }
    .search-input:focus { border-color: var(--border2); }

    .filters {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .pill {
      font-size: 10px;
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .pill:hover { color: var(--text); }
    .pill.active { background: var(--surface2); border-color: var(--border2); color: var(--text); }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .list::-webkit-scrollbar { width: 3px; }
    .list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .list::-webkit-scrollbar-track { background: transparent; }

    .empty {
      padding: 80px 24px;
      text-align: center;
      color: var(--text-2, #b8b8b8);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      font-weight: 300;
    }
    .empty .empty-sub {
      display: block;
      margin-top: 14px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 0.06em;
      line-height: 2;
    }
    .empty .hotkey {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 10px;
      margin: 0 2px;
      color: var(--text-2, #b8b8b8);
    }

    .item {
      padding: 12px 18px 12px 14px;
      border-bottom: 1px solid var(--border);
      cursor: grab;
      transition: background 0.14s, transform 0.14s, border-color 0.14s;
      position: relative;
      display: flex;
      gap: 11px;
      align-items: stretch;
    }
    .item:hover {
      background: var(--surface2);
      transform: translateX(-1px);
    }
    .item.dragging { opacity: 0.4; cursor: grabbing; }
    .item.new { animation: pop 0.4s ease; }

    @keyframes pop {
      0% { background: #1e2a1e; }
      100% { background: transparent; }
    }

    /* drag handle — 6 dots, only visible on hover */
    .item .drag-handle {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.14s;
      flex-shrink: 0;
      align-self: center;
      width: 4px;
      margin-left: -8px;
    }
    .item:hover .drag-handle { opacity: 0.32; }
    .item .drag-handle .dot-row {
      display: flex;
      gap: 2px;
    }
    .item .drag-handle .dot-row span {
      width: 2px;
      height: 2px;
      background: currentColor;
      border-radius: 50%;
    }

    .item-icon-col {
      flex-shrink: 0;
      align-self: flex-start;
      padding-top: 2px;
    }
    .type-badge {
      font-size: 9px;
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 7px;
      border-radius: 3px;
      display: inline-block;
      line-height: 1;
    }
    .type-badge.text { color: #999; background: #1e1e1e; border: 1px solid #2a2a2a; }
    .type-badge.code { color: #a0a0ff; background: #161625; border: 1px solid #2a2a44; }
    .type-badge.url  { color: #6dbf8c; background: #0f1f14; border: 1px solid #1a3322; }
    .type-badge.img  { color: #d4a06a; background: #1f160a; border: 1px solid #3a2510; }

    /* main content column */
    .item-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* primary headline — first line of the clip, strongly weighted */
    .item-headline {
      font-size: 13.5px;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text);
      letter-spacing: -0.005em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-headline.clamp-2 {
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      /* fade overflow at the bottom */
      mask-image: linear-gradient(to bottom, black 70%, rgba(0,0,0,0.6) 100%);
    }

    /* code preview — monospace, tinted background, compact */
    .item-headline.code-preview {
      font-family: var(--font-mono);
      font-size: 11.5px;
      font-weight: 400;
      color: #c8c8d8;
      background: rgba(160, 160, 255, 0.04);
      padding: 6px 9px;
      border-radius: 4px;
      border: 1px solid rgba(160, 160, 255, 0.08);
      white-space: pre;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: 56px;
      mask-image: linear-gradient(to bottom, black 70%, rgba(0,0,0,0.4) 100%);
    }

    /* meta row — type, time, source, etc. small monospace */
    .item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .item-meta .domain {
      color: #6dbf8c;
      letter-spacing: 0;
    }
    .item-meta .lang-tag {
      background: var(--surface2);
      color: #a0a0d0;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .item-meta .dot { color: var(--muted2); }
    .item-meta .time { color: var(--muted2); }

    /* image preview — bigger, more prominent */
    .item-image {
      margin-top: 6px;
      max-width: 100%;
      max-height: 140px;
      border-radius: 5px;
      display: block;
      border: 1px solid var(--border);
      transition: max-height 0.2s;
    }
    .item:hover .item-image { max-height: 180px; }

    .actions {
      position: absolute;
      right: 12px;
      top: 12px;
      display: none;
      gap: 4px;
      align-items: center;
      background: var(--surface2);
      padding: 3px;
      border-radius: 5px;
      border: 1px solid var(--border2);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .item:hover .actions { display: flex; }
    .act-btn {
      background: transparent;
      border: none;
      border-radius: 3px;
      color: var(--muted);
      font-size: 10px;
      font-family: var(--font-mono);
      padding: 4px 8px;
      cursor: pointer;
      transition: color 0.12s, background 0.12s;
      letter-spacing: 0.04em;
    }
    .act-btn:hover { color: var(--text); background: var(--surface3, #2a2a2a); }
    .act-btn.danger:hover { color: #c46a6a; }

    .footer {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .footer-info {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .clear-btn {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.12s;
    }
    .clear-btn:hover { color: #c46a6a; }

    .toast {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e1e;
      border: 1px solid #333;
      color: #aaa;
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 6px 14px;
      border-radius: 3px;
      letter-spacing: 0.06em;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .skip-pulse {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5a8a5a;
      margin-right: 6px;
      vertical-align: middle;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .skip-pulse.on { opacity: 1; }

    /* pause toggle in titlebar */
    .pause-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 3px;
      margin-right: 4px;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .pause-btn:hover { color: var(--text); background: var(--surface2); }
    .pause-btn .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #5a8a5a;
      transition: background 0.2s;
    }
    .pause-btn.paused .dot { background: #c49a3a; }

    /* update-available badge — sits left of pause btn, only shown when a
       newer release exists on github. clicking opens the release page. */
    .update-badge {
      -webkit-app-region: no-drag;
      background: none;
      border: 1px solid #4a7a4a;
      color: #8fbf8f;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.04em;
      cursor: pointer;
      padding: 3px 7px;
      border-radius: 3px;
      margin-right: 6px;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .update-badge:hover {
      color: #b8d9b8;
      background: rgba(90, 138, 90, 0.12);
      border-color: #6a9a6a;
    }
    .update-badge .update-arrow {
      font-size: 11px;
      line-height: 1;
    }

    .titlebar-right {
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
    }

    /* dim the list when paused */
    body.paused .list { opacity: 0.4; pointer-events: none; }
    body.paused .controls { opacity: 0.5; }
    .paused-banner {
      display: none;
      padding: 8px 18px;
      background: #1a1508;
      border-bottom: 1px solid #2a2210;
      color: #c49a3a;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-align: center;
    }
    body.paused .paused-banner { display: block; }

    /* promote-on-recopy: flash the item when bumped to top */
    .item.promoted { animation: promote 0.7s ease; }
    @keyframes promote {
      0%   { background: #2a1f08; }
      50%  { background: #1e1a0a; }
      100% { background: transparent; }
    }

    /* pinned section */
    .section-label {
      padding: 10px 18px 6px;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--muted2);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: color 0.12s;
    }
    .section-label:hover { color: var(--muted); }
    .section-label-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-label .chevron {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-right: 1px solid currentColor;
      border-bottom: 1px solid currentColor;
      transform: rotate(45deg);
      transition: transform 0.18s ease;
      margin-right: 2px;
      margin-top: -2px;
    }
    .section-label.collapsed .chevron {
      transform: rotate(-45deg);
      margin-top: 0;
    }
    .section-label .count {
      color: var(--muted2);
      font-weight: 400;
    }
    .section-label .pin-icon {
      width: 8px; height: 8px;
      display: inline-block;
    }
    .pinned-section {
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .pinned-section .item {
      background: rgba(255, 215, 140, 0.02);
    }
    .section-content.collapsed {
      display: none;
    }

    /* pin button — little star/dot on each item */
    .pin-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 3px;
      color: var(--muted);
      font-size: 11px;
      font-family: var(--font-mono);
      padding: 3px 7px;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
      line-height: 1;
    }
    .pin-btn:hover { color: #d4a06a; border-color: #3a2510; }
    .pin-btn.pinned {
      color: #d4a06a;
      border-color: #3a2510;
      background: #1f160a;
    }
    .pin-btn.pinned:hover { color: #ecb57d; }
  </style>
</head>
<body>
  <div class="app">
    <div class="titlebar">
      <span class="title">stash</span>
      <div class="titlebar-right">
        <button class="update-badge" id="updateBadge" title="" style="display:none">
          <span class="update-arrow">↑</span>
          <span id="updateLabel"></span>
        </button>
        <button class="pause-btn" id="pauseBtn" title="pause clipboard capture">
          <span class="dot"></span>
          <span id="pauseLabel">live</span>
        </button>
        <button class="close-btn" id="closeBtn" title="hide (⌘⇧V)">×</button>
      </div>
    </div>

    <div class="paused-banner">clipboard capture paused</div>

    <div class="controls">
      <input class="search-input" id="search" placeholder="search clipboard..." />
      <div class="filters">
        <button class="pill active" data-type="all">all</button>
        <button class="pill" data-type="pinned">pinned</button>
        <button class="pill" data-type="text">text</button>
        <button class="pill" data-type="code">code</button>
        <button class="pill" data-type="url">url</button>
        <button class="pill" data-type="img">image</button>
      </div>
    </div>

    <div class="list" id="list">
      <div class="empty">
        Stash quietly remembers while you work.
        <span class="empty-sub">copy anything to begin · <span class="hotkey">⌘</span><span class="hotkey">⇧</span><span class="hotkey">V</span> to toggle</span>
      </div>
    </div>

    <div class="footer">
      <span class="footer-info"><span class="skip-pulse" id="skipPulse" title="a secret-looking item was skipped"></span><span id="footerInfo">0 items</span></span>
      <button class="clear-btn" id="clearBtn">clear all</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let history = [];
    let pinned = [];
    let activeFilter = 'all';
    let searchQuery = '';
    // Section collapse state — in-memory only, resets on app restart
    let collapsed = { pinned: false, recent: false };

    const listEl = document.getElementById('list');
    const footerEl = document.getElementById('footerInfo');
    const searchEl = document.getElementById('search');
    const toastEl = document.getElementById('toast');

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function timeAgo(ts) {
      const s = Math.floor((Date.now() - ts) / 1000);
      if (s < 10) return 'just now';
      if (s < 60) return s + 's ago';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    }

    function itemMatchesFilter(c, isPinned) {
      if (activeFilter === 'pinned') return isPinned;
      if (activeFilter !== 'all' && c.type !== activeFilter) return false;
      if (searchQuery && !c.content.toLowerCase().includes(searchQuery)) return false;
      return true;
    }

    // URL helpers
    function domainOf(url) {
      try {
        const u = new URL(url);
        return u.hostname.replace(/^www\./, '');
      } catch { return null; }
    }
    function urlHeadline(url) {
      try {
        const u = new URL(url);
        const path = (u.pathname + u.search).replace(/^\//, '');
        if (path.length > 0) return path.slice(0, 80);
        return u.hostname.replace(/^www\./, '');
      } catch { return url.slice(0, 80); }
    }

    // crude language detection — used for the small lang-tag on code clips
    function detectLang(text) {
      const t = text.trim();
      if (/^\s*<[a-z]/i.test(t)) return 'html';
      if (/^\s*(import|from|def |class )/.test(t)) return 'py';
      if (/(^|\s)(function|const|let|var|=>|import .* from)/.test(t)) return 'js';
      if (/^\s*SELECT |^\s*INSERT |^\s*UPDATE |^\s*WHERE /i.test(t)) return 'sql';
      if (/(^|\s)#include|::\s*\w+/.test(t)) return 'c';
      if (/^\s*\{[\s\S]*\}\s*$/.test(t) && t.includes('"')) return 'json';
      return null;
    }

    function buildItemEl(c, isPinned) {
      const el = document.createElement('div');
      let cls = 'item';
      if (c._new) cls += ' new';
      if (c._promoted) cls += ' promoted';
      el.className = cls;
      el.draggable = true;
      el.dataset.id = c.id;

      // Build per-type content. The hierarchy is consistent:
      //   [drag] [type badge] [headline + meta + (optional thumb)]
      let headlineHtml = '';
      let extraHtml = '';
      let metaParts = [];

      if (c.type === 'url') {
        const dom = domainOf(c.content);
        headlineHtml = `<div class="item-headline">${esc(urlHeadline(c.content))}</div>`;
        if (dom) metaParts.push(`<span class="domain">${esc(dom)}</span>`);
        metaParts.push(`<span class="dot">·</span>`);
        metaParts.push(`<span class="time">${isPinned ? 'pinned' : timeAgo(c.ts) + ' ago'}</span>`);
      } else if (c.type === 'code') {
        // code preview — first ~3 lines, monospace, in a tinted box
        const lines = c.content.split('\n');
        const previewText = lines.slice(0, 3).join('\n').slice(0, 240);
        headlineHtml = `<div class="item-headline code-preview">${esc(previewText)}</div>`;
        const lang = detectLang(c.content);
        if (lang) metaParts.push(`<span class="lang-tag">${lang}</span>`);
        metaParts.push(`<span class="time">${isPinned ? 'pinned' : timeAgo(c.ts) + ' ago'}</span>`);
        if (lines.length > 3) metaParts.push(`<span class="dot">·</span><span>+${lines.length - 3} more lines</span>`);
      } else if (c.type === 'img') {
        headlineHtml = `<div class="item-headline">${esc(c.meta || 'image')}</div>`;
        metaParts.push(`<span class="time">${isPinned ? 'pinned' : timeAgo(c.ts) + ' ago'}</span>`);
        if (c.dataUrl) {
          extraHtml = `<img class="item-image" src="${c.dataUrl}" alt=""/>`;
        }
      } else {
        // text — first line big, fade if there's more
        const lines = c.content.split('\n');
        const firstLine = lines[0].slice(0, 200);
        const hasMore = lines.length > 1 || c.content.length > firstLine.length;
        const headlineClass = hasMore ? 'item-headline clamp-2' : 'item-headline';
        // For multiline, show first 2 lines clamped; otherwise just first line
        const showText = hasMore ? c.content.slice(0, 240) : firstLine;
        headlineHtml = `<div class="${headlineClass}">${esc(showText)}</div>`;
        metaParts.push(`<span class="time">${isPinned ? 'pinned' : timeAgo(c.ts) + ' ago'}</span>`);
        if (hasMore && lines.length > 2) {
          metaParts.push(`<span class="dot">·</span><span>+${lines.length - 2} more lines</span>`);
        }
      }

      const metaHtml = `<div class="item-meta">${metaParts.join('')}</div>`;

      el.innerHTML = `
        <div class="drag-handle">
          <div class="dot-row"><span></span><span></span></div>
          <div class="dot-row"><span></span><span></span></div>
          <div class="dot-row"><span></span><span></span></div>
        </div>
        <div class="item-icon-col">
          <span class="type-badge ${c.type}">${c.type}</span>
        </div>
        <div class="item-content">
          ${headlineHtml}
          ${metaHtml}
          ${extraHtml}
        </div>
        <div class="actions">
          <button class="pin-btn ${isPinned ? 'pinned' : ''}" data-act="pin" title="${isPinned ? 'unpin' : 'pin'}">${isPinned ? '★' : '☆'}</button>
          <button class="act-btn" data-act="copy" title="copy">copy</button>
          <button class="act-btn danger" data-act="del" title="delete">del</button>
        </div>
      `;

      // native drag-out
      el.addEventListener('dragstart', (e) => {
        e.preventDefault();
        el.classList.add('dragging');
        window.api.drawerDragStart();
        window.api.startDrag(c);
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        window.api.drawerDragEnd();
      });

      el.querySelector('[data-act="copy"]').addEventListener('click', async (e) => {
        e.stopPropagation();
        await window.api.write(c);
        toast('copied — paste with ⌘V');
      });

      el.querySelector('[data-act="del"]').addEventListener('click', async (e) => {
        e.stopPropagation();
        await window.api.delete(c.id);
        if (isPinned) pinned = pinned.filter(p => p.id !== c.id);
        else history = history.filter(h => h.id !== c.id);
        render();
      });

      el.querySelector('[data-act="pin"]').addEventListener('click', async (e) => {
        e.stopPropagation();
        if (isPinned) {
          await window.api.unpin(c.id);
          toast('unpinned');
        } else {
          await window.api.pin(c.id);
          toast('pinned — kept across restarts');
        }
      });

      // click anywhere else re-copies
      el.addEventListener('click', async () => {
        await window.api.write(c);
        toast('copied — paste with ⌘V');
      });

      if (c._new) setTimeout(() => { c._new = false; }, 400);
      if (c._promoted) setTimeout(() => { c._promoted = false; }, 800);

      return el;
    }

    function buildSectionLabel(key, iconHtml, labelText, count) {
      const label = document.createElement('div');
      const isCollapsed = collapsed[key];
      label.className = 'section-label' + (isCollapsed ? ' collapsed' : '');
      label.dataset.section = key;
      label.innerHTML = `
        <span class="section-label-left">
          <span class="chevron"></span>
          ${iconHtml ? `<span>${iconHtml}</span>` : ''}
          <span>${labelText}</span>
        </span>
        <span class="count">${count}</span>
      `;
      label.addEventListener('click', () => {
        collapsed[key] = !collapsed[key];
        render();
      });
      return label;
    }

    function render() {
      const visiblePinned = pinned.filter(c => itemMatchesFilter(c, true));
      const visibleHistory = activeFilter === 'pinned'
        ? []
        : history.filter(c => itemMatchesFilter(c, false));

      // Auto-expand on active search if matches exist in the hidden section.
      // Without this, typing a query that only matches pinned/recent in a
      // collapsed section silently returns nothing — feels broken.
      if (searchQuery) {
        if (collapsed.pinned && visiblePinned.length > 0) collapsed.pinned = false;
        if (collapsed.recent && visibleHistory.length > 0) collapsed.recent = false;
      }

      const totalVisible = visiblePinned.length + visibleHistory.length;
      const totalItems = history.length + pinned.length;
      footerEl.textContent = `${totalVisible} of ${totalItems} items${pinned.length ? ` · ${pinned.length} pinned` : ''}`;

      if (totalVisible === 0) {
        if (totalItems === 0) {
          listEl.innerHTML = `<div class="empty">Stash quietly remembers while you work.<span class="empty-sub">copy anything to begin · <span class="hotkey">⌘</span><span class="hotkey">⇧</span><span class="hotkey">V</span> to toggle</span></div>`;
        } else {
          listEl.innerHTML = `<div class="empty">nothing matches that.<span class="empty-sub">try a different search</span></div>`;
        }
        return;
      }

      listEl.innerHTML = '';

      // Pinned section
      if (visiblePinned.length > 0) {
        const section = document.createElement('div');
        section.className = 'pinned-section';
        section.appendChild(buildSectionLabel('pinned', '★', 'pinned', visiblePinned.length));
        const content = document.createElement('div');
        content.className = 'section-content' + (collapsed.pinned ? ' collapsed' : '');
        visiblePinned.forEach(c => content.appendChild(buildItemEl(c, true)));
        section.appendChild(content);
        listEl.appendChild(section);
      }

      // Recent section
      if (visibleHistory.length > 0) {
        // Only show the "recent" header when there's also a pinned section above it
        // (otherwise the drawer has one section and the label is visual noise)
        if (visiblePinned.length > 0) {
          listEl.appendChild(buildSectionLabel('recent', '', 'recent', visibleHistory.length));
          const content = document.createElement('div');
          content.className = 'section-content' + (collapsed.recent ? ' collapsed' : '');
          visibleHistory.forEach(c => content.appendChild(buildItemEl(c, false)));
          listEl.appendChild(content);
        } else {
          visibleHistory.forEach(c => listEl.appendChild(buildItemEl(c, false)));
        }
      }
    }

    let toastTimer;
    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1500);
    }

    // filters
    document.querySelectorAll('.pill').forEach(p => {
      p.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
        p.classList.add('active');
        activeFilter = p.dataset.type;
        render();
      });
    });

    // search
    searchEl.addEventListener('input', (e) => {
      searchQuery = e.target.value.toLowerCase();
      render();
    });

    // clear
    document.getElementById('clearBtn').addEventListener('click', async () => {
      if (history.length === 0) return;
      await window.api.clear();
      history = [];
      render();
    });

    // close/hide
    document.getElementById('closeBtn').addEventListener('click', () => window.api.hide());

    // escape to hide
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.api.hide();
      // cmd/ctrl+f focuses search
      if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
        e.preventDefault();
        searchEl.focus();
      }
    });

    // listen for new clips from main
    window.api.onNewClip((entry) => {
      entry._new = true;
      history = history.filter(h => h.id !== entry.id);
      history.unshift(entry);
      render();
    });

    // listen for promoted (re-copied) clips — bump to top with flash animation
    window.api.onPromoted((entry) => {
      // check if it's in pinned or history
      const pinnedIdx = pinned.findIndex(p => p.id === entry.id);
      if (pinnedIdx > -1) {
        pinned.splice(pinnedIdx, 1);
        entry._promoted = true;
        pinned.unshift(entry);
      } else {
        history = history.filter(h => h.id !== entry.id);
        entry._promoted = true;
        history.unshift(entry);
      }
      render();
    });

    // listen for skipped (secret-looking) clips — pulse the footer dot briefly
    const skipPulse = document.getElementById('skipPulse');
    let skipTimer;
    window.api.onSkipped(() => {
      skipPulse.classList.add('on');
      clearTimeout(skipTimer);
      skipTimer = setTimeout(() => skipPulse.classList.remove('on'), 2500);
    });

    // pause state
    const pauseBtn = document.getElementById('pauseBtn');
    const pauseLabel = document.getElementById('pauseLabel');
    function applyPausedState(paused) {
      document.body.classList.toggle('paused', paused);
      pauseBtn.classList.toggle('paused', paused);
      pauseLabel.textContent = paused ? 'paused' : 'live';
      pauseBtn.title = paused ? 'resume clipboard capture' : 'pause clipboard capture';
    }
    pauseBtn.addEventListener('click', async () => {
      const current = await window.api.getPaused();
      await window.api.setPaused(!current);
      // applyPausedState will be called via onPauseChanged
    });
    window.api.onPauseChanged((v) => applyPausedState(v));

    // listen for history cleared from tray menu
    window.api.onHistoryCleared(() => {
      history = [];
      render();
    });

    // listen for state updates (pin/unpin actions from main)
    window.api.onStateUpdated((state) => {
      history = state.history || [];
      pinned = state.pinned || [];
      render();
    });

    // listen for update-available notification from main process
    // (fired once at startup if a newer release exists on github, and again
    // every 6 hours while the app is running)
    const updateBadge = document.getElementById('updateBadge');
    const updateLabel = document.getElementById('updateLabel');
    let updateUrl = null;
    window.api.onUpdateAvailable(({ version, url }) => {
      updateUrl = url;
      updateLabel.textContent = version;
      updateBadge.title = `new version ${version} available — click to download`;
      updateBadge.style.display = 'flex';
    });
    updateBadge.addEventListener('click', () => {
      if (updateUrl) window.api.openExternal(updateUrl);
    });

    // initial load
    (async () => {
      const state = await window.api.getHistory();
      history = state.history || [];
      pinned = state.pinned || [];
      const paused = await window.api.getPaused();
      applyPausedState(paused);
      render();
      setInterval(render, 30000);
    })();
  </script>
</body>
</html>
